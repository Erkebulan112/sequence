server:
  port: 8080

spring:
  application:
    name: sequence

  datasource:
    url: jdbc:postgresql://localhost:5432/sequence
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
